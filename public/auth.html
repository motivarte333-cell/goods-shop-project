<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 굿즈샵</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">굿즈샵</a>
    </div>
  </header>

  <main>
    <div class="auth-container">
      <div class="card" style="padding: 24px;">
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">로그인</button>
          <button class="auth-tab" onclick="switchTab('signup')">회원가입</button>
        </div>

        <div id="login-form" class="auth-form active">
          <div class="form-group">
            <label>이메일</label>
            <input type="email" id="login-email" placeholder="이메일 입력">
          </div>
          <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="login-password" placeholder="비밀번호 입력">
          </div>
          <button class="btn btn-primary" onclick="login()">로그인</button>
        </div>

        <div id="signup-form" class="auth-form">
          <div class="form-group">
            <label>이메일</label>
            <input type="email" id="signup-email" placeholder="이메일 입력">
          </div>
          <div class="form-group">
            <label>비밀번호 (6자 이상)</label>
            <input type="password" id="signup-password" placeholder="비밀번호 입력">
          </div>
          <button class="btn btn-primary" onclick="signup()">회원가입</button>
        </div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
