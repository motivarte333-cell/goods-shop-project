<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>결제 내역 - Turingshop</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Turingshop">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">굿즈샵</a>
      <nav class="header-nav">
        <a href="index.html">쇼핑</a>
        <button class="btn-logout" onclick="logout()">로그아웃</button>
      </nav>
    </div>
  </header>

  <main>
    <p class="page-title">내 결제 내역</p>
    <div id="order-list" class="order-list">
      <div class="loading">불러오는 중...</div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/orders.js"></script>
  <script src="js/pwa-install.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/goods-shop-project/sw.js', { scope: '/goods-shop-project/' })
      })
    }
  </script>
</body>
</html>
