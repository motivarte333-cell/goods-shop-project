<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경: 브랜드 블루, 큰 radius -->
  <rect width="512" height="512" rx="100" fill="#2563eb"/>

  <!-- 쇼핑백 몸체 -->
  <rect x="106" y="224" width="300" height="216" rx="28" fill="white"/>

  <!-- T자 손잡이: 가로 바 (Turing의 T + 손잡이 상단) -->
  <rect x="154" y="148" width="204" height="36" rx="18" fill="white"/>

  <!-- T자 손잡이: 세로 기둥 (가로 바와 백 몸체 연결) -->
  <rect x="238" y="172" width="36" height="64" rx="14" fill="white"/>

  <!-- 백 클래스프 디테일 (깊이감) -->
  <rect x="220" y="276" width="72" height="48" rx="10" fill="#1d4ed8" opacity="0.28"/>
  <rect x="236" y="290" width="40" height="8" rx="4" fill="white" opacity="0.65"/>
  <rect x="236" y="306" width="40" height="8" rx="4" fill="white" opacity="0.42"/>
</svg>
